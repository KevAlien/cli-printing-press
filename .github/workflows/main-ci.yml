name: Main CI

# Runs the full unit-test + golden-verify suite against main and against PRs
# targeting main. The push trigger is the post-merge alarm; the pull_request
# trigger lets a branch protection rule require the stable build-and-test check
# with "Require branches to be up to date before merging" enabled.
#
# For main-targeted PRs, lint.yml delegates duplicate Go/generated tests here
# and keeps the faster lint/docs checks. This workflow is the load-bearing
# build/test/golden/generated-output signal branch protection can pin against.
# Its expensive work is split across parallel jobs, then folded into the stable
# build-and-test check.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# cancel-in-progress so a batch of rapid merges only burns CI for the final
# state. The question this workflow answers is "is this PR up to date with main
# and does the full suite pass?" Only the latest run for a ref matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  classify:
    name: classify full-suite scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      needs_build: ${{ steps.changes.outputs.needs_build }}
      needs_tests: ${{ steps.changes.outputs.needs_tests }}
      needs_golden: ${{ steps.changes.outputs.needs_golden }}
      needs_generated_output: ${{ steps.changes.outputs.needs_generated_output }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          needs_build=false
          needs_tests=false
          needs_golden=false
          needs_generated_output=false

          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Keep the post-merge alarm full-strength on main. PRs get the
            # scoped path below so docs-only changes do not burn the suite.
            needs_build=true
            needs_tests=true
            needs_golden=true
            needs_generated_output=true
          else
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            mapfile -t changed < <(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD")

            echo "Changed files:"
            printf '  %s\n' "${changed[@]}"

            for file in "${changed[@]}"; do
              case "$file" in
                .github/workflows/main-ci.yml)
                  needs_build=true
                  needs_tests=true
                  needs_golden=true
                  ;;
                *.go|go.mod|go.sum|cmd/*|internal/*)
                  needs_build=true
                  needs_tests=true
                  ;;
              esac

              case "$file" in
                .github/workflows/main-ci.yml|.github/workflows/lint.yml|scripts/*|testdata/*)
                  needs_tests=true
                  ;;
              esac

              case "$file" in
                .github/workflows/main-ci.yml|.github/workflows/golden.yml|cmd/*|internal/*|testdata/golden/*|scripts/golden.sh|go.mod|go.sum)
                  needs_golden=true
                  ;;
              esac

              case "$file" in
                scripts/verify-generator-output.sh|cmd/*|internal/generator/*|internal/openapi/*|testdata/golden/cases/generate-*|testdata/golden/fixtures/*|go.mod|go.sum)
                  needs_generated_output=true
                  ;;
              esac
            done
          fi

          {
            echo "needs_build=$needs_build"
            echo "needs_tests=$needs_tests"
            echo "needs_golden=$needs_golden"
            echo "needs_generated_output=$needs_generated_output"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Full-suite scope"
            echo
            echo "- build: \`$needs_build\`"
            echo "- tests: \`$needs_tests\`"
            echo "- golden: \`$needs_golden\`"
            echo "- generated-output: \`$needs_generated_output\`"
          } >> "$GITHUB_STEP_SUMMARY"

  full-build:
    name: full-build
    runs-on: ubuntu-latest
    needs: classify
    # Full tests compile every package already, so keep the standalone build
    # only for future scopes that need build proof without running tests.
    if: needs.classify.outputs.needs_build == 'true' && needs.classify.outputs.needs_tests != 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

  full-test:
    name: full-test (${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.needs_tests == 'true'
    timeout-minutes: 20
    # Shard the full (non-short) suite across package partitions, then split
    # the slow single-package generator shard by top-level test name. The
    # aggregate result feeds `build-and-test` via needs.full-test.result, so
    # the required check name is unchanged.
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: generator-0
          - shard: generator-1
          - shard: generator-2
          - shard: generator-3
          - shard: pipeline
          - shard: cli
          - shard: rest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Test
        shell: bash
        run: |
          set -euo pipefail

          run_partition=false
          shard_index=0
          shard_total=1

          case "${{ matrix.shard }}" in
            generator-*)
              packages=(./internal/generator)
              run_partition=true
              shard_index="${{ matrix.shard }}"
              shard_index="${shard_index#generator-}"
              shard_total=4
              ;;
            pipeline)
              packages=(./internal/pipeline/...)
              ;;
            cli)
              packages=(./internal/cli/...)
              ;;
            rest)
              mapfile -t packages < <(go list ./... | grep -Ev '/internal/(generator|pipeline|cli)(/|$)')
              ;;
            *)
              echo "unknown test shard: ${{ matrix.shard }}" >&2
              exit 1
              ;;
          esac

          printf 'Testing packages:\n'
          printf '  %s\n' "${packages[@]}"

          # No -short: main-ci is the full-coverage gate, unlike lint.yml's
          # fast -short shards.
          if [[ "$run_partition" == "true" ]]; then
            test_list=/tmp/go-test-list.txt
            selected_list=/tmp/go-test-selected.txt
            go test -list '^(Test|Example)' "${packages[0]}" > "$test_list"
            python3 -c 'import hashlib, sys; idx = int(sys.argv[1]); total = int(sys.argv[2]); [print(name) for name in (line.strip() for line in sys.stdin) if name.startswith(("Test", "Example")) and int(hashlib.sha256(name.encode()).hexdigest(), 16) % total == idx]' "$shard_index" "$shard_total" < "$test_list" > "$selected_list"
            selected_count="$(awk 'NF { count++ } END { print count + 0 }' "$selected_list")"
            if [[ "$selected_count" -eq 0 ]]; then
              echo "No tests selected for shard ${{ matrix.shard }}."
              exit 0
            fi
            pattern="$(
              python3 -c 'import re, sys; names = [line.strip() for line in sys.stdin if line.strip()]; print("^(" + "|".join(re.escape(name) for name in names) + ")$")' < "$selected_list"
            )"
            echo "Selected $selected_count top-level tests for shard ${{ matrix.shard }}."
            set +e
            go test -json -timeout 15m -run "$pattern" "${packages[@]}" 2>&1 | tee /tmp/go-test.json
            status=${PIPESTATUS[0]}
            set -e
          else
            set +e
            go test -json -timeout 15m "${packages[@]}" 2>&1 | tee /tmp/go-test.json
            status=${PIPESTATUS[0]}
            set -e
          fi

          python3 - /tmp/go-test.json <<'PY'
          import json
          import sys

          packages = {}
          tests = 0
          with open(sys.argv[1]) as events:
              for line in events:
                  try:
                      event = json.loads(line)
                  except Exception:
                      continue
                  if event.get("Action") == "pass" and event.get("Test"):
                      tests += 1
                  if event.get("Action") in {"pass", "fail"} and event.get("Test") is None:
                      packages[event["Package"]] = event.get("Elapsed", 0)

          print("Slowest Go packages:")
          for pkg, elapsed in sorted(packages.items(), key=lambda item: -item[1])[:15]:
              print(f"{elapsed:6.1f}s {pkg}")
          print(f"test_pass_events {tests}")
          PY

          exit "$status"

  full-golden:
    name: full-golden
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.needs_golden == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Verify golden fixtures
        run: bash scripts/golden.sh verify

  generated_output_compile:
    name: generated-output-compile
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.needs_generated_output == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Compile generated CLI outputs
        run: bash scripts/verify-generator-output.sh

  build-and-test:
    runs-on: ubuntu-latest
    needs:
      - classify
      - full-build
      - full-test
      - full-golden
      - generated_output_compile
    if: ${{ always() }}
    timeout-minutes: 5
    steps:
      - name: Check full-suite jobs
        shell: bash
        run: |
          if [[ "${{ needs.classify.result }}" != "success" ]]; then
            echo "change classification failed or was cancelled."
            exit 1
          fi
          if [[ "${{ needs.classify.outputs.needs_build }}" == "true" && "${{ needs.classify.outputs.needs_tests }}" != "true" && "${{ needs.full-build.result }}" != "success" ]]; then
            echo "full-build failed or was cancelled."
            exit 1
          fi
          if [[ "${{ needs.classify.outputs.needs_tests }}" == "true" && "${{ needs.full-test.result }}" != "success" ]]; then
            echo "full-test failed or was cancelled."
            exit 1
          fi
          if [[ "${{ needs.classify.outputs.needs_golden }}" == "true" && "${{ needs.full-golden.result }}" != "success" ]]; then
            echo "full-golden failed or was cancelled."
            exit 1
          fi
          if [[ "${{ needs.classify.outputs.needs_generated_output }}" == "true" && "${{ needs.generated_output_compile.result }}" != "success" ]]; then
            echo "generated-output-compile failed or was cancelled."
            exit 1
          fi

          echo "Full-suite scope:"
          echo "  build=${{ needs.classify.outputs.needs_build }} result=${{ needs.full-build.result }} (covered by full-test when tests=true)"
          echo "  tests=${{ needs.classify.outputs.needs_tests }} result=${{ needs.full-test.result }}"
          echo "  golden=${{ needs.classify.outputs.needs_golden }} result=${{ needs.full-golden.result }}"
          echo "  generated-output=${{ needs.classify.outputs.needs_generated_output }} result=${{ needs.generated_output_compile.result }}"
